[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600

lib_deps =
    mathieucarbou/ESP Async WebServer @ ^3.0.6
    mathieucarbou/AsyncTCP @ ^3.2.0
    bblanchon/ArduinoJson @ ^6.21.3

board_build.filesystem = spiffs

build_flags =
    -DCORE_DEBUG_LEVEL=0
